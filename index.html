<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zonas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { display: flex; flex-direction: column; height: 100vh; background: #f5f5f5; }
    #map { flex: 1; width: 100%; }
    #panel {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .input-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 12px; color: #666; }
    input[type=number] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 140px; }
    button {
      padding: 7px 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #f0f0f0; }
    button.danger { color: #c0392b; border-color: #c0392b; }
    #resultado {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    #resultado.found { background: #e1f5ee; color: #085041; border: 1px solid #1D9E75; }
    #resultado.notfound { background: #faece7; color: #4a1b0c; border: 1px solid #D85A30; }
    #zonas-lista { width: 100%; display: flex; flex-wrap: wrap; gap: 6px; }
    .zona-badge {
      font-size: 12px;
      padding: 3px 12px;
      border-radius: 999px;
      background: #eeedfe;
      color: #26215c;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .zona-badge span { cursor: pointer; color: #993556; font-weight: bold; }
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    #modal-box {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      min-width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    #modal-box h3 { margin-bottom: 12px; font-size: 15px; }
    #modal-box input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="input-group">
    <label>Latitud</label>
    <input type="number" id="lat" placeholder="4.8133" step="0.0001"/>
  </div>
  <div class="input-group">
    <label>Longitud</label>
    <input type="number" id="lon" placeholder="-74.0059" step="0.0001"/>
  </div>
  <button onclick="verificarPunto()">Verificar punto</button>
  <div id="resultado"></div>
  <div id="zonas-lista"></div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <h3>Nombre de la zona</h3>
    <input type="text" id="nombre-zona" placeholder="Ej: Zona Norte, Bodega Sur..."/>
    <div class="modal-actions">
      <button onclick="cancelarZona()">Cancelar</button>
      <button onclick="guardarZona()">Guardar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script>
  const API = 'http://127.0.0.1:8000';
  const COLORS = ['#534AB7','#1D9E75','#BA7517','#993556','#378ADD','#D85A30'];
  let zonas = [];
  let pendingLayer = null;
  let markerLayer = null;
  let colorIndex = 0;

  const map = L.map('map').setView([4.8133, -74.0059], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

  const drawnItems = new L.FeatureGroup().addTo(map);
  const drawControl = new L.Control.Draw({
    edit: { featureGroup: drawnItems, edit: false, remove: false },
    draw: {
      polygon: { shapeOptions: { color: '#534AB7', weight: 2, fillOpacity: 0.2 }, allowIntersection: false },
      polyline: false, rectangle: false, circle: false, circlemarker: false, marker: false
    }
  }).addTo(map);

  map.on(L.Draw.Event.CREATED, function(e) {
    pendingLayer = e.layer;
    document.getElementById('modal-overlay').classList.add('show');
    setTimeout(() => document.getElementById('nombre-zona').focus(), 50);
  });

  document.getElementById('nombre-zona').addEventListener('keydown', e => {
    if (e.key === 'Enter') guardarZona();
  });

  async function guardarZona() {
    const nombre = document.getElementById('nombre-zona').value.trim();
    if (!nombre || !pendingLayer) return;
    const latlngs = pendingLayer.getLatLngs()[0];
    const coordenadas = latlngs.map(ll => [ll.lat, ll.lng]);

    const res = await fetch(`${API}/zonas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, coordenadas })
    });
    const zona = await res.json();

    const color = COLORS[colorIndex % COLORS.length];
    colorIndex++;
    pendingLayer.setStyle({ color, fillColor: color, fillOpacity: 0.2, weight: 2 });
    pendingLayer.bindTooltip(nombre, { permanent: true, direction: 'center' });
    drawnItems.addLayer(pendingLayer);
    zonas.push({ ...zona, layer: pendingLayer });

    pendingLayer = null;
    document.getElementById('nombre-zona').value = '';
    document.getElementById('modal-overlay').classList.remove('show');
    renderBadges();
  }

  function cancelarZona() {
    pendingLayer = null;
    document.getElementById('nombre-zona').value = '';
    document.getElementById('modal-overlay').classList.remove('show');
  }

  async function eliminarZona(id) {
    await fetch(`${API}/zonas/${id}`, { method: 'DELETE' });
    const zona = zonas.find(z => z.id === id);
    if (zona) drawnItems.removeLayer(zona.layer);
    zonas = zonas.filter(z => z.id !== id);
    renderBadges();
  }

  async function verificarPunto() {
    const lat = parseFloat(document.getElementById('lat').value);
    const lon = parseFloat(document.getElementById('lon').value);
    const resultado = document.getElementById('resultado');

    if (isNaN(lat) || isNaN(lon)) {
      resultado.className = 'notfound';
      resultado.style.display = 'block';
      resultado.textContent = 'Ingresa coordenadas válidas.';
      return;
    }

    if (markerLayer) map.removeLayer(markerLayer);
    markerLayer = L.circleMarker([lat, lon], {
      radius: 8, color: '#D85A30', fillColor: '#F0997B', fillOpacity: 1, weight: 2
    }).addTo(map);
    map.setView([lat, lon], map.getZoom());

    const res = await fetch(`${API}/zonas/verificar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat, lon })
    });
    const data = await res.json();

    resultado.style.display = 'block';
    if (data.zona) {
      resultado.className = 'found';
      resultado.textContent = `Zona encontrada: ${data.zona}`;
    } else {
      resultado.className = 'notfound';
      resultado.textContent = 'El punto no pertenece a ninguna zona definida.';
    }
  }

  function renderBadges() {
    const lista = document.getElementById('zonas-lista');
    lista.innerHTML = zonas.map(z =>
      `<div class="zona-badge">${z.nombre} <span onclick="eliminarZona('${z.id}')">✕</span></div>`
    ).join('');
  }

  async function cargarZonas() {
    const res = await fetch(`${API}/zonas`);
    const data = await res.json();
    data.forEach((zona, i) => {
      const color = COLORS[i % COLORS.length];
      const latlngs = zona.coordenadas.map(c => [c[0], c[1]]);
      const layer = L.polygon(latlngs, { color, fillColor: color, fillOpacity: 0.2, weight: 2 });
      layer.bindTooltip(zona.nombre, { permanent: true, direction: 'center' });
      layer.addTo(drawnItems);
      zonas.push({ ...zona, layer });
      colorIndex++;
    });
    renderBadges();
  }

  cargarZonas();
</script>
</body>
</html>
